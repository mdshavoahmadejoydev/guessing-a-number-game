<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Project</title>

  <style>
    .playerTwo, .inputTwo, .buttonTwo, .errorTwo, .chance{
      display: none;
    }
  </style>


</head>
<body>
  <h1 class="playerOne">Player One</h1>
  <input class="inputOne" type="text" placeholder="Enter a Number: ">
  <button class="buttonOne">Start</button>
  <h3 class="errorOne"></h3>


  <h1 class="playerTwo">Player Two</h1>
  <h3 class="chance"></h3>
  <input class="inputTwo" type="text" placeholder="Guessing number: ">
  <button class="buttonTwo">Check</button>
  <h3 class="errorTwo"></h3>



  <script src="./index.js"></script>
</body>
</html>
